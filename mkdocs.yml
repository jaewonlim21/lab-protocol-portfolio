site_name: Jaewon Lim | Lab Methods Portfolio
site_url: https://jaewonlim21.github.io/lab-protocol-portfolio/
site_description: Experimental methods, workflows, and troubleshooting notes for recombinant protein expression and characterization.
repo_name: GitHub
repo_url: https://github.com/jaewonlim21/lab-protocol-portfolio

theme:
  name: material
  language: en
  icon:
    logo: material/flask-outline
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: white
      accent: black
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - About: about.md
  - Protocols:
      - Preparing BMGY/BMMY: protocols/media-prep.md
      - Pichia Expression: protocols/pichia-expression.md
      - Methanol Feeding & OD600: protocols/methanol-feeding.md
      - Cell Lysis: protocols/cell-lysis.md
      - Ni-NTA Purification: protocols/ni-nta.md
      - SDS-PAGE: protocols/sds-page.md
      - Western Blot: protocols/western-blot.md
  - Workflows:
      - Recombinant Lectin Workflow: workflows/lectin-workflow.md
  - Contact: contact.md
